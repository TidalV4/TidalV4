<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TidalWatch | Watch Anime</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Tidal<span>Watch</span></div>
        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">Trending</a>
            <a href="#">Latest</a>
        </nav>
        <div class="search-container">
            <input type="text" id="anime-query" placeholder="Search anime records...">
        </div>
        <div class="status-widget" id="api-status">
            <span class="dot online"></span>
            <span>API: Online</span>
        </div>
    </header>

    <main>
        <div class="hero">
            <div class="hero-box">
                <div class="hero-info">
                    <h1 id="hero-title">Discover the Depths</h1>
                    <p id="hero-summary">High performance anime streaming with automated failover and minimalist design.</p>
                    <div class="hero-actions">
                        <button class="srv-btn active" style="padding: 12px 30px;">Watch Latest</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="section-head">
                <h2>Trending</h2>
                <a href="#" class="view-more">View All</a>
            </div>
            <div class="grid" id="main-grid">
                <!-- Data injected by main.js -->
            </div>

            <div class="section-head" style="margin-top: 4rem;">
                <h2>Recently Updated</h2>
            </div>
            <div class="grid" id="recent-grid">
                <!-- Data injected by main.js -->
            </div>
        </div>
    </main>

    <div id="player-overlay" class="player-modal">
        <div class="player-box">
            <div class="section-head">
                <h2 id="current-anime-title">Anime Title</h2>
                <button class="srv-btn" id="close-player">Close</button>
            </div>
            <div class="video-frame" id="player-root">
                <!-- Video Source -->
            </div>
            <div class="controls-bar">
                <div class="server-list" id="server-switcher">
                    <!-- Servers -->
                    <button class="srv-btn active">MegaCloud</button>
                    <button class="srv-btn">VidSrc</button>
                    <button class="srv-btn">Anikai</button>
                </div>
                <div class="options">
                    <select id="stream-type" class="srv-btn">
                        <option value="sub">Sub</option>
                        <option value="dub">Dub</option>
                    </select>
                    <select id="sub-mode" class="srv-btn">
                        <option value="soft">Soft Sub</option>
                        <option value="hard">Hard Sub</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
